<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ======================================================== -->
    <!-- INICIO: ETIQUETAS OPEN GRAPH (Para WhatsApp, Facebook)   -->
    <!-- ======================================================== -->
    <!-- 1. El título principal que aparecerá al compartir el enlace -->
    <meta property="og:title" content="Invitación: Cena Alegre - Día del Maestro" />

    <!-- 2. La descripción muy corta que va debajo del título -->
    <meta property="og:description"
        content="Acompáñanos este miércoles 29 en la Quincho San Francisco. Aporte: 50.000 Gs." />

    <!-- 3. [ENLACE DE TU PÁGINA]: Reemplaza donde dice 'URL_AQUI' con el enlace real donde subirás esta web -->
    <meta property="og:url" content="https://wed-de-invitaci-n-para-dia-del-maes.vercel.app/" />

    <!-- 4. [IMAGEN PARA WHATSAPP]: Reemplaza donde dice 'URL_IMAGEN.jpg' con un enlace de la imagen o logo que quieras generar como miniatura de vista previa -->
    <meta property="og:image" content="https://github.com/EDUPARD01/Wed-de-invitaci-n-para-dia-del-maestro-/blob/main/portada.jpg?raw=true" />

    <meta property="og:type" content="website" />
    <!-- ======================================================== -->
    <!-- FIN: ETIQUETAS OPEN GRAPH                                -->
    <!-- ======================================================== -->

    <title>Cena Alegre - Día del Maestro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #c1121f;
            --black: #000000;
            --bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--black);
        }

        .mobile-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }

        /* Formas Geométricas (Estilo del certificado) */
        .shapes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        /* Esquina Superior Derecha (Negro) */
        .corner-tr {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 200px;
            height: 200px;
            background: var(--black);
            transform: rotate(45deg);
        }

        .corner-tr-line1 {
            position: absolute;
            top: -112px;
            right: -112px;
            width: 260px;
            height: 260px;
            border: 6px solid var(--black);
            transform: rotate(45deg);
        }

        .corner-tr-line2 {
            position: absolute;
            top: -125px;
            right: -125px;
            width: 300px;
            height: 300px;
            border: 2px solid var(--black);
            transform: rotate(45deg);
        }

        /* Esquina Inferior Izquierda (Rojo + Puntos) */
        .corner-bl {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 300px;
            height: 300px;
            background: var(--red);
            transform: rotate(45deg);
        }

        /* Patrón de puntos */
        .corner-bl::after {
            content: '';
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            bottom: 50px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.7) 2px, transparent 2.5px);
            background-size: 15px 15px;
        }

        .corner-bl-line1 {
            position: absolute;
            bottom: -175px;
            left: -175px;
            width: 380px;
            height: 380px;
            border: 6px solid var(--red);
            transform: rotate(45deg);
        }

        .corner-bl-line2 {
            position: absolute;
            bottom: -195px;
            left: -195px;
            width: 430px;
            height: 430px;
            border: 2px solid var(--red);
            transform: rotate(45deg);
        }

        /* Contenido Principal */
        .content-wrapper {
            position: relative;
            z-index: 10;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .logo-placeholder {
            width: 90px;
            height: 90px;
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--black);
            color: var(--red);
            text-align: center;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: var(--black);
            text-align: center;
        }

        .info-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--black);
        }

        .info-value.highlight {
            color: var(--red);
            font-size: 1.6rem;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--black) 0%, #333 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            margin-top: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 20;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        /* Overlay del Formulario */
        .form-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .form-overlay.active {
            transform: translateY(0);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .form-header h2 {
            font-size: 1.8rem;
            color: var(--red);
            font-family: 'Dancing Script', cursive;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.5rem;
            color: var(--black);
            cursor: pointer;
            line-height: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--red);
            background: #fff;
        }

        .btn-submit {
            background: var(--red);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 6px 15px rgba(193, 18, 31, 0.3);
            transition: transform 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .list-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .list-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--black);
        }

        .guest-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .guest-item {
            background: #fff;
            border-left: 4px solid var(--red);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .guest-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .guest-qty {
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--black);
        }

        .empty-state {
            text-align: center;
            color: #999;
            font-size: 0.95rem;
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <!-- Elementos Decorativos -->
        <div class="shapes-container">
            <div class="corner-tr"></div>
            <div class="corner-tr-line1"></div>
            <div class="corner-tr-line2"></div>

            <div class="corner-bl"></div>
            <div class="corner-bl-line1"></div>
            <div class="corner-bl-line2"></div>
        </div>

        <!-- Contenido Principal -->
        <div class="content-wrapper">
            <!-- ======================================================== -->
            <!-- 5. [TU LOGO]: Reemplaza la línea de abajo con una etiqueta IMG para poner tu logo real -->
            <!-- Por ejemplo: <img src="ruta/a/tu/logo.png" alt="Logo" style="width: 90px; height: 90px; border-radius: 50%;"> -->
            <!-- ======================================================== -->
            <img src="logo.png" alt="Logo" style="width: 90px; height: 90px; border-radius: 0%;">

            <h1 class="title">Cena Alegre</h1>
            <div class="subtitle">Día del Maestro</div>

            <div class="info-container">
                <div class="info-item">
                    <div class="info-label">Fecha</div>
                    <div class="info-value">Miércoles 29</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Lugar</div>
                    <div class="info-value">Quincho San Francisco</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Aporte</div>
                    <div class="info-value highlight">50.000 Gs.</div>
                </div>
            </div>

            <button class="btn-main" id="btnOpenForm">Confirmar Presencia</button>
        </div>

        <!-- Formulario (Se desliza hacia arriba) -->
        <div class="form-overlay" id="formOverlay">
            <div class="form-header">
                <h2>Tu Confirmación</h2>
                <button class="close-btn" id="btnCloseForm">&times;</button>
            </div>

            <form id="reservationForm">
                <div class="form-group">
                    <label for="guestName">Nombre y Apellido</label>
                    <input type="text" id="guestName" name="nombre" required placeholder="Ej. Ana Mencia">
                </div>
                <div class="form-group">
                    <label for="guestQty">Cantidad de Personas</label>
                    <input type="number" id="guestQty" name="cantidad" min="1" required placeholder="Ej. 2">
                </div>
                <button type="submit" class="btn-submit">Enviar Datos</button>
            </form>

        </div>
    </div>

    <script>
        // ========================================================
        // AQUÍ PEGAS LA "URL" QUE TE DIO APPS SCRIPT
        // ========================================================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyLrFC_4A_kxHfMyUnrYqmGjRlb4zbPlz5l73IhZBXWZh6a3hHDwHcrj_NDCSLtVPl1wQ/exec';
        // ========================================================

        const btnOpenForm = document.getElementById('btnOpenForm');
        const btnCloseForm = document.getElementById('btnCloseForm');
        const formOverlay = document.getElementById('formOverlay');
        const reservationForm = document.getElementById('reservationForm');
        const btnSubmit = document.querySelector('.btn-submit');

        btnOpenForm.addEventListener('click', () => formOverlay.classList.add('active'));
        btnCloseForm.addEventListener('click', () => formOverlay.classList.remove('active'));

        reservationForm.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.innerText = 'Enviando...';
            btnSubmit.disabled = true;

            // Formatear datos para que Google Apps Script los entienda
            const requestBody = new URLSearchParams(new FormData(reservationForm));

            // Se envía a Google Sheets invisiblemente esquivando el error de CORS
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: requestBody
            })
                .then(response => {
                    // Al usar 'no-cors' la respuesta siempre es exitosa aunque sea opaca
                    alert('¡Confirmación enviada! Gracias por confirmar.');
                    reservationForm.reset();
                    formOverlay.classList.remove('active');
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('Ocurrió un error de red. Intenta nuevamente.');
                })
                .finally(() => {
                    btnSubmit.innerText = 'Enviar Datos';
                    btnSubmit.disabled = false;
                });
        });
    </script>
</body>

</html>
